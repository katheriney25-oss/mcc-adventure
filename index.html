<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <title>MCC Adventure</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <main class ="app">

        <header class="hero">
            <h1 id="title">MoonCity Con: A Meeple Among Us</h1>
            <h2 id="subtitle">Loading Investigation...</h2>
        </header>

        <section class="bingo-card" id="bingoCard"></section>
        <section class="status-panel">
            <p id="bingoStatus">
                Bingos completed: 0
            </p>
            <button id="resetCardButton" class="reset-button">
                Reset Investigation
            </button>
        </section>

        <div id="detectiveHome">

            <img 
                id="detectiveCharacter"
                src="images/meeple-detective.png"
                alt="Meeple Detective">
            
            <div id="detectiveStatus">
                Awaiting<br>Coordinates
            </div>
        </div>

    </main>

    <div id="transmissionModal" class="modal hidden">
    <div class="modal-content">
        <button id="closeModal" class="modal-close">×</button>

        <div class="modal-icon">📡</div>

        <h2 id="modalTitle">Incoming Transmission</h2>

        <p id="modalMessage">
            Transmission decrypted.
        </p>

        <button id="openTransmissionButton" class="modal-action">
            Open Transmission
        </button>
    </div>
</div>

    <script src="js/app.js"></script>

</body>
</html>
